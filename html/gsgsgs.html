<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS리테일</title>
    <link rel="stylesheet" href="../css/font.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/gsgsgs.css">
</head>
<body>
    <box id="box">
        <div class="box1">
            <div class="title">
                <h3><span>GS리테일</span> 멤버십</h3>
            </div>
            <div class="content">
                <div class="member_content">
                    <img src="../img/sweet.jpg" alt="아메리카노">
                    <div class="menu">
                        <h4>TOP스위트아메리카노</h4>
                        <p><img src="../img/won.jpg" alt="원">2,200</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="box2">
            <div class="title">
                <h3><span>GS리테일</span> Youtube</h3>
            </div>
            <div class="content">
                <div class="youtube_content">
                    <img class="icon" src="../img/youtube_icon.jpg" alt="유튜브아이콘">
                    <h4><span>GS리테일의 공식<br> Youtube채널</span></h4>
                    <P>다양하고 재미있는 GS리테일만의 동영상을 확인해보세요</P>
                    <img class="you" src="../img/youtube.jpg" alt="유튜브영상재생">
                </div>
            </div>
            <div class="video"></div>
        </div>
        <div class="box3">
            <div class="title2">
                <h3><span>GS리테일</span> 빠른 서비스</h3>
            </div>
            <div class="content2">
                <div class="detail_box1">
                    <div class="mini_box1">
                        <img src="../img/check.jpg" alt="출석체크">
                        <div class="font04">
                            <h5>출석체크</h5>
                            <p>매일매일 출석체크&#33;</p>
                        </div>
                    </div>
                </div>
                <div class="detail_box2">
                    <div class="mini_box2">
                        <img src="../img/consult.jpg" alt="매장입점">
                        <div class="font04">
                            <h5>입점상담</h5>
                            <p>GS리테일 입점안내&#33;</p>
                        </div>
                    </div>
                </div>
                <div class="detail_box3">
                    <div class="mini_box3">
                        <img src="../img/membership.jpg" alt="멤버십카드">
                        <div class="font04">
                            <h5>멤버십 카드등록</h5>
                            <p>풍성한 적립과 <br>실속 있는 혜택&#33;</p>
                        </div>
                    </div>
                </div>
                <div class="detail_box4">
                    <div class="mini_box4">
                        <img src="../img/recurt.jpg" alt="채용안내">
                        <div class="font04">
                            <h5>채용안내</h5>
                            <p>꿈과 열정으로 <br> 도전하세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </box>
    <div id="sub_box">
        <div class="box_left">
            <div class="point">
                <img src="../img/gs_point.jpg" alt="gs포인트">
                <div class="font07">
                    <h4 class="white">GS&#38;POINT</h4>
                    <p class="white font06">무한 혜택 알아보기&#33;</p>
                </div>
            </div>
            <div class="notice">
                <h5>공지사항</h5>
                <p>더보기 <img src="../img/plus.jpg" alt="더보기"></p>
                <div class="font05">
                    <ol>
                        <li>&#91;GS25&#93; 나만의 냉장고 리뉴얼 오픈 안내</li>
                        <li>&#91;전체&#93; 2월의 매일매일 달콤한 사랑고백</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
